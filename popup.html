<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --accent: #38bdf8;
      --accent-glow: rgba(56, 189, 248, 0.15);
      --danger: #ef4444;
      --text: #f8fafc;
    }

    body { 
      width: 360px; 
      background: var(--bg); 
      color: var(--text); 
      font-family: 'Plus Jakarta Sans', 'Segoe UI', sans-serif; 
      margin: 0; 
      padding: 15px; 
    }

    .glass-container { 
      background: var(--card); 
      border-radius: 16px; 
      padding: 20px; 
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
    }

    header { text-align: center; margin-bottom: 20px; }
    header h2 { margin: 0; font-size: 18px; letter-spacing: -0.5px; font-weight: 700; }
    header h2 span { color: var(--accent); }
    header p { font-size: 10px; opacity: 0.5; margin: 4px 0 0; text-transform: uppercase; letter-spacing: 1px; }

    .stats-grid { 
      display: grid; 
      grid-template-columns: 1fr 1fr; 
      gap: 12px; 
      margin-bottom: 20px; 
    }

    .stat-card { 
      background: rgba(15, 23, 42, 0.5); 
      padding: 15px; 
      border-radius: 12px; 
      text-align: center; 
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: transform 0.2s;
    }

    .stat-card:hover { transform: translateY(-2px); border-color: var(--accent); }
    .stat-card span { display: block; font-size: 26px; font-weight: 800; color: var(--text); }
    .stat-card label { font-size: 9px; color: var(--accent); font-weight: 700; text-transform: uppercase; margin-top: 5px; display: block; }

    .actions { display: grid; grid-template-columns: 1.5fr 1fr; gap: 10px; }

    button { 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      gap: 8px; 
      padding: 12px; 
      border: none; 
      border-radius: 10px; 
      cursor: pointer; 
      font-weight: 600; 
      font-size: 13px; 
      transition: all 0.2s ease;
    }

    #downloadBtn { background: var(--accent); color: var(--bg); box-shadow: 0 4px 14px var(--accent-glow); }
    #downloadBtn:hover { filter: brightness(1.1); transform: scale(1.02); }

    #clearBtn { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); }
    #clearBtn:hover { background: var(--danger); color: white; }

    svg { width: 16px; height: 16px; stroke-width: 2.5; }
  </style>
</head>
<body>
  <div class="glass-container">
    <header>
      <h2>EMAIL <span>SCRAPPER</span></h2>
      <p>Business Lead Extraction</p>
    </header>
    
    <div class="stats-grid">
      <div class="stat-card">
        <span id="total">0</span>
        <label>Leads Found</label>
      </div>
      <div class="stat-card">
        <span id="siteCount">0</span>
        <label>Sites Scanned</label>
      </div>
    </div>

    <div class="actions">
      <button id="downloadBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download Leads
      </button>
      <button id="clearBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
        Delete All
      </button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
